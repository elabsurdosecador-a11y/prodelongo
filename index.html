<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prodelongo</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#071528;
    color:white;
}

header{
    text-align:center;
    padding:30px;
}

h1{
    margin:0;
    font-size:42px;
}

.login{
    max-width:400px;
    margin:20px auto;
    background:#10233f;
    padding:20px;
    border-radius:12px;
}

input{
    width:100%;
    padding:12px;
    margin:6px 0;
    border-radius:8px;
    border:none;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#2ecc71;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.ranking{
    max-width:800px;
    margin:20px auto;
    background:#10233f;
    padding:20px;
    border-radius:12px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    text-align:left;
    border-bottom:1px solid #29476f;
}
</style>

</head>
<body>

<header>
    <h1>🏆 PRODELONGO</h1>
    <p>Prode Mundial 2026</p>
    <p>Exacto = 3 pts | Ganador/Empate/Perdedor = 1 pt</p>
</header>

<div class="login">
    <h2>Ingresar</h2>

    <input type="text" placeholder="Usuario">

    <input type="password" placeholder="Contraseña">

    <button>Ingresar</button>

    <p>¿Primera vez? Crear usuario</p>
</div>

<div class="ranking">
    <h2>Tabla de Posiciones</h2>

    <table>
        <tr>
            <th>#</th>
            <th>Jugador</th>
            <th>Puntos</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Pedro</td>
            <td>3</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Judith</td>
            <td>0</td>
        </tr>
    </table>
</div>

</body>
</html>
