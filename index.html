<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prodelongo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg:#061326;
      --card:#10233f;
      --card2:#0d1d35;
      --text:#f4f7fb;
      --muted:#9fb0c8;
      --line:#263c5d;
      --accent:#40c9ff;
      --good:#35d07f;
      --warn:#ffcc66;
      --danger:#ff6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at top left,#183a66 0,transparent 34%),
        linear-gradient(180deg,#061326,#030914);
      color:var(--text);
      min-height:100vh;
    }

    header {
      padding:24px 16px 12px;
      text-align:center;
    }

    header h1 {
      margin:0;
      font-size:34px;
    }

    header p {
      margin:6px 0 0;
      color:var(--muted);
    }

    .layout {
      max-width:1180px;
      margin:0 auto;
      padding:0 14px 32px;
    }

    .topbar {
      display:grid;
      grid-template-columns:1fr 290px;
      gap:16px;
      margin-bottom:18px;
    }

    .ranking,
    .login-box,
    .group-card {
      background:rgba(16,35,63,.94);
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:0 12px 35px rgba(0,0,0,.28);
    }

    .ranking,
    .login-box {
      padding:16px;
    }

    h2 {
      margin:0 0 10px;
      font-size:18px;
    }

    table {
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    th,td {
      padding:8px 7px;
      border-bottom:1px solid rgba(255,255,255,.08);
      text-align:left;
    }

    th {
      color:var(--muted);
      font-weight:700;
    }

    input {
      width:100%;
      padding:10px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#08182d;
      color:var(--text);
      margin-bottom:8px;
      font-size:14px;
    }

    button {
      border:0;
      border-radius:10px;
      padding:10px 12px;
      color:#00101f;
      background:var(--accent);
      font-weight:900;
      cursor:pointer;
      width:100%;
      margin-top:4px;
    }

    button:disabled {
      opacity:.45;
      cursor:not-allowed;
    }

    .secondary {
      background:transparent;
      border:1px solid var(--accent);
      color:var(--accent);
    }

    .logout {
      background:var(--warn);
    }

    .status {
      color:#fff;
      font-size:12px;
      text-align:center;
      margin-top:8px;
      line-height:1.35;
      min-height:18px;
    }

    .user-panel {
      display:none;
      margin-top:10px;
      padding:10px;
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      background:#08182d;
      font-size:13px;
      color:var(--muted);
    }

    .fixture {
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:16px;
    }

    .group-card {
      padding:12px;
      min-width:0;
    }

    .group-title {
      background:#f4f7fb;
      color:#10233f;
      border-radius:10px;
      text-align:center;
      font-weight:1000;
      padding:8px;
      margin-bottom:10px;
      text-transform:uppercase;
      font-size:14px;
      letter-spacing:.3px;
    }

    .match {
      display:grid;
      grid-template-columns:minmax(110px, 1.3fr) 46px 18px 46px minmax(110px, 1.3fr);
      align-items:center;
      gap:7px;
      background:var(--card2);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:8px;
      margin-bottom:8px;
    }

    .team {
      min-width:0;
      font-size:13px;
      font-weight:900;
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
    }

    .team.right {
      text-align:right;
    }

    .meta {
      grid-column:1 / -1;
      color:var(--muted);
      font-size:11px;
      margin-top:-3px;
      padding:0 2px 2px;
      display:flex;
      justify-content:space-between;
      gap:8px;
    }

    .score {
      width:46px;
      height:34px;
      border-radius:10px;
      border:1px solid #36557e;
      background:#edf3fa;
      color:#071528;
      text-align:center;
      font-weight:1000;
      font-size:16px;
      margin:0;
      padding:0;
    }

    .dash {
      text-align:center;
      color:var(--muted);
      font-weight:1000;
    }

    .save {
      margin-top:10px;
      background:var(--good);
    }

    .empty {
      padding:16px;
      text-align:center;
      color:var(--muted);
    }

    .admin-box {
      margin-top:10px;
      display:none;
    }

    .admin-box h3 {
      font-size:14px;
      margin:12px 0 8px;
      color:var(--warn);
    }

    @media(max-width:900px) {
      .topbar { grid-template-columns:1fr; }
      .fixture { grid-template-columns:1fr; }
    }

    @media(max-width:520px) {
      header h1 { font-size:27px; }
      .layout { padding:0 10px 24px; }
      .match {
        grid-template-columns:minmax(80px, 1fr) 40px 14px 40px minmax(80px, 1fr);
        gap:5px;
        padding:7px;
      }
      .score {
        width:40px;
        height:32px;
      }
      .team {
        font-size:12px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>🏆 Prodelongo</h1>
    <p>Prode Mundial 2026</p>
    <p>Marcador exacto: 3 pts · Ganador / empate / perdedor: 1 pt</p>
  </header>

  <div class="layout">
    <section class="topbar">
      <div class="ranking">
        <h2>Tabla de posiciones</h2>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Participante</th>
              <th>Pts</th>
              <th>Exactos</th>
              <th>G/E/P</th>
            </tr>
          </thead>
          <tbody id="rankingBody">
            <tr><td colspan="5">Cargando...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="login-box">
        <h2 id="loginTitle">Ingresar</h2>

        <input id="usuario" type="text" placeholder="Nombre de usuario" autocomplete="username" />
        <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password" />

        <button onclick="login()">Loguearme</button>
        <button class="secondary" onclick="crearUsuario()">Crear usuario</button>
        <button class="logout" onclick="logout()" style="display:none" id="logoutBtn">Salir</button>

        <div class="user-panel" id="userPanel"></div>
        <div class="status" id="estado">Sin login: podés ver la tabla. Para pronosticar, ingresá.</div>
      </div>
    </section>

    <main class="fixture" id="fixture"></main>
  </div>

  <script>
    const SUPABASE_URL = "https://udkujkdbdnbkmidcraqx.supabase.co";
    const SUPABASE_KEY = "sb_publishable_zXUMOP2wW5uuT80pDjPw4g_uIzgt3tC";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let usuarioActual = null;
    let partidos = [];
    let pronosticos = [];

    function setEstado(msg) {
      document.getElementById("estado").textContent = msg;
    }

    function guardarSesionLocal(usuario) {
      localStorage.setItem("prodelongo_usuario", JSON.stringify(usuario));
    }

    function leerSesionLocal() {
      try {
        return JSON.parse(localStorage.getItem("prodelongo_usuario"));
      } catch {
        return null;
      }
    }

    function borrarSesionLocal() {
      localStorage.removeItem("prodelongo_usuario");
    }

    function pintarUsuario() {
      const logoutBtn = document.getElementById("logoutBtn");
      const loginTitle = document.getElementById("loginTitle");
      const panel = document.getElementById("userPanel");

      if (!usuarioActual) {
        logoutBtn.style.display = "none";
        loginTitle.textContent = "Ingresar";
        panel.style.display = "none";
        panel.innerHTML = "";
        return;
      }

      logoutBtn.style.display = "block";
      loginTitle.textContent = "Hola, " + usuarioActual.nombre;
      panel.style.display = "block";
      panel.innerHTML = `
        <strong>Usuario:</strong> ${usuarioActual.nombre}<br>
        <strong>Rol:</strong> ${usuarioActual.rol || "jugador"}
      `;
    }

    async function crearUsuario() {
      const nombre = document.getElementById("usuario").value.trim();
      const password = document.getElementById("password").value;

      if (!nombre || !password) {
        return setEstado("Completá usuario y contraseña.");
      }

      const { data, error } = await client.rpc("registrar_usuario", {
        p_nombre: nombre,
        p_password: password
      });

      if (error) {
        return setEstado("Error al crear usuario: " + error.message);
      }

      if (!data || data.length === 0) {
        return setEstado("No se pudo crear el usuario.");
      }

      usuarioActual = data[0];
      guardarSesionLocal(usuarioActual);
      pintarUsuario();

      setEstado("Usuario creado y logueado.");

      await cargarRanking();
      await cargarPronosticos();
      dibujarFixture();
    }

    async function login() {
      const nombre = document.getElementById("usuario").value.trim();
      const password = document.getElementById("password").value;

      if (!nombre || !password) {
        return setEstado("Completá usuario y contraseña.");
      }

      const { data, error } = await client.rpc("login_usuario", {
        p_nombre: nombre,
        p_password: password
      });

      if (error) {
        return setEstado("No pude entrar: " + error.message);
      }

      if (!data || data.length === 0) {
        return setEstado("Usuario o contraseña incorrectos.");
      }

      usuarioActual = data[0];
      guardarSesionLocal(usuarioActual);
      pintarUsuario();

      setEstado("Logueado. Ya podés cargar pronósticos.");

      await cargarPronosticos();
      dibujarFixture();
      await cargarRanking();
    }

    async function logout() {
      usuarioActual = null;
      pronosticos = [];
      borrarSesionLocal();
      pintarUsuario();
      setEstado("Sesión cerrada.");
      dibujarFixture();
    }

    async function cargarRanking() {
      const { data, error } = await client
        .from("ranking")
        .select("*");

      const body = document.getElementById("rankingBody");

      if (error) {
        body.innerHTML = `<tr><td colspan="5">Error cargando ranking: ${error.message}</td></tr>`;
        return;
      }

      body.innerHTML = "";

      if (!data || data.length === 0) {
        body.innerHTML = `<tr><td colspan="5">Todavía no hay participantes.</td></tr>`;
        return;
      }

      data.forEach((r, i) => {
        body.innerHTML += `
          <tr>
            <td>${i + 1}</td>
            <td>${r.nombre}</td>
            <td>${r.puntos}</td>
            <td>${r.exactos}</td>
            <td>${r.aciertos_gpe}</td>
          </tr>
        `;
      });
    }

    async function cargarPartidos() {
      const { data, error } = await client
        .from("partidos")
        .select("*")
        .order("grupo", { ascending: true })
        .order("fecha", { ascending: true });

      if (error) {
        setEstado("Error cargando partidos: " + error.message);
        partidos = [];
        dibujarFixture();
        return;
      }

      partidos = data || [];
      dibujarFixture();
    }

    async function cargarPronosticos() {
      if (!usuarioActual) {
        pronosticos = [];
        return;
      }

      const { data, error } = await client
        .from("pronosticos")
        .select("*")
        .eq("usuario_id", usuarioActual.id);

      if (error) {
        setEstado("Error cargando pronósticos: " + error.message);
        pronosticos = [];
        return;
      }

      pronosticos = data || [];
    }

    function getPronostico(partidoId) {
      return pronosticos.find(p => p.partido_id === partidoId);
    }

    function formatFecha(fecha) {
      if (!fecha) return "";
      try {
        const d = new Date(fecha);
        return d.toLocaleString("es-AR", {
          day:"2-digit",
          month:"2-digit",
          hour:"2-digit",
          minute:"2-digit"
        });
      } catch {
        return "";
      }
    }

    function dibujarFixture() {
      const fixture = document.getElementById("fixture");
      fixture.innerHTML = "";

      if (!partidos || partidos.length === 0) {
        fixture.innerHTML = `
          <section class="group-card">
            <div class="empty">Todavía no hay partidos cargados.</div>
          </section>
        `;
        return;
      }

      const grupos = {};

      partidos.forEach(p => {
        if (!grupos[p.grupo]) grupos[p.grupo] = [];
        grupos[p.grupo].push(p);
      });

      Object.entries(grupos).forEach(([grupo, lista]) => {
        const card = document.createElement("section");
        card.className = "group-card";
        card.innerHTML = `<div class="group-title">Grupo ${grupo}</div>`;

        lista.forEach(p => {
          const pr = getPronostico(p.id);
          const bloqueado = p.cerrado;
          const disabled = !usuarioActual || bloqueado ? "disabled" : "";
          const fecha = formatFecha(p.fecha);
          const resultadoReal = p.goles_local !== null && p.goles_visitante !== null
            ? `Final: ${p.goles_local} - ${p.goles_visitante}`
            : (bloqueado ? "Cerrado" : "Abierto");

          card.innerHTML += `
            <div class="match">
              <div class="meta">
                <span>${fecha}</span>
                <span>${resultadoReal}</span>
              </div>

              <div class="team" title="${p.equipo_local}">
                <span class="team-name">${p.equipo_local}</span>
              </div>

              <input
                class="score"
                id="l_${p.id}"
                type="number"
                min="0"
                inputmode="numeric"
                value="${pr?.goles_local ?? ""}"
                ${disabled}
              >

              <div class="dash">-</div>

              <input
                class="score"
                id="v_${p.id}"
                type="number"
                min="0"
                inputmode="numeric"
                value="${pr?.goles_visitante ?? ""}"
                ${disabled}
              >

              <div class="team right" title="${p.equipo_visitante}">
                <span class="team-name">${p.equipo_visitante}</span>
              </div>
            </div>
          `;
        });

        card.innerHTML += `
          <button
            class="save"
            onclick="guardarGrupo('${grupo}')"
            ${!usuarioActual ? "disabled" : ""}
          >
            Guardar Grupo ${grupo}
          </button>
        `;

        fixture.appendChild(card);
      });
    }

    async function guardarGrupo(grupo) {
      if (!usuarioActual) {
        return setEstado("Primero tenés que ingresar.");
      }

      const lista = partidos.filter(p => p.grupo === grupo && !p.cerrado);
      const registros = [];

      for (const p of lista) {
        const gl = document.getElementById("l_" + p.id).value;
        const gv = document.getElementById("v_" + p.id).value;

        if (gl === "" || gv === "") continue;

        registros.push({
          usuario_id: usuarioActual.id,
          partido_id: p.id,
          goles_local: Number(gl),
          goles_visitante: Number(gv)
        });
      }

      if (!registros.length) {
        return setEstado("No hay pronósticos completos para guardar.");
      }

      const { error } = await client
        .from("pronosticos")
        .upsert(registros, { onConflict: "usuario_id,partido_id" });

      if (error) {
        return setEstado("Error al guardar: " + error.message);
      }

      setEstado("Pronósticos guardados.");
      await cargarPronosticos();
      await cargarRanking();
      dibujarFixture();
    }

    async function iniciar() {
      await cargarRanking();
      await cargarPartidos();

      const sesion = leerSesionLocal();

      if (sesion && sesion.id && sesion.nombre) {
        usuarioActual = sesion;
        pintarUsuario();
        setEstado("Sesión iniciada.");
        await cargarPronosticos();
        dibujarFixture();
      } else {
        pintarUsuario();
      }
    }

    iniciar();
  </script>
</body>
</html>
